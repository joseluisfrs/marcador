<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marcador Táctil Premium - Billar a Tres Bandas</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Oswald:wght@400;600;700&family=Montserrat:wght@300;400;600;700&display=swap');

/* ══════════════════════════════════════════════
   SISTEMA DE DISEÑO Y DETALLES PREMIUM
══════════════════════════════════════════════ */
:root {
    --bg: #090e17;
    --bg2: #111a2e;
    --blue: #165bb0;
    --blue2: #2185f4;
    --gold: #f2c037;
    --white: #ffffff;
    --gray: #8295b0;
    --red: #e03030;
    --green: #1eaa3a;
    --glass-bg: rgba(17, 26, 46, 0.7);
    --glass-border: rgba(255, 255, 255, 0.08);
    --shadow-premium: 0 12px 40px rgba(0, 0, 0, 0.5);
}

* { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent; 
}

html, body {
    width: 100%; 
    height: 100vh; 
    overflow: hidden;
    background: var(--bg); 
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    user-select: none; 
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior-y: contain; /* Prevents pull-to-refresh on Android Chrome */
}

.screen { 
    display: none; 
    width: 100%; 
    height: 100vh; 
    opacity: 0;
    transition: opacity 0.3s ease-in-out;
}
.screen.on { 
    display: flex; 
    opacity: 1;
}



.wb {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 18px 24px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--white);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.wb:active {
    transform: scale(0.96);
    filter: brightness(0.85);
}

.wb-g {
    background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
    border-top: 1px solid rgba(255,255,255,0.2);
}
.wb-g:hover {
    box-shadow: 0 0 20px rgba(40, 167, 69, 0.4);
}

.wb-r {
    background: linear-gradient(135deg, #dc3545 0%, #bd2130 100%);
    border-top: 1px solid rgba(255,255,255,0.2);
}
.wb-r:hover {
    box-shadow: 0 0 20px rgba(220, 53, 69, 0.4);
}

.wb-b {
    background: linear-gradient(135deg, #17a2b8 0%, #117a8b 100%);
    border-top: 1px solid rgba(255,255,255,0.2);
}

.wm-skip-all {
    width: 100%;
    max-width: 500px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--gray);
    font-size: 1rem;
    margin-top: 10px;
}
.wm-skip-all:hover {
    background: rgba(255, 255, 255, 0.1);
    color: var(--white);
}

/* ══════════════════════════════════════════════
   P2 — CONFIGURACIÓN
══════════════════════════════════════════════ */
#p-cfg {
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    background: radial-gradient(circle at center, #111e33 0%, #060a12 100%);
    overflow-y: auto;
    padding: 30px 15px;
}

.cfg-card {
    width: 100%;
    max-width: 560px;
    background: var(--bg2);
    border: 1px solid #1f304e;
    border-radius: 20px;
    padding: 30px 24px;
    box-shadow: var(--shadow-premium);
}

.cfg-tit {
    font-size: 1.4rem;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 5px;
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 24px;
    position: relative;
}
.cfg-tit::after {
    content: '';
    display: block;
    width: 50px;
    height: 3px;
    background: var(--gold);
    margin: 8px auto 0;
    border-radius: 2px;
}

.cfg-lbl {
    font-size: 0.75rem;
    color: var(--gray);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    display: block;
    margin: 14px 0 6px;
}

.cfg-in {
    background: #070b13;
    border: 1px solid #1b2b47;
    color: #edf5ff;
    padding: 13px 38px 13px 16px;
    width: 100%;
    border-radius: 10px;
    font-size: 1rem;
    font-family: 'Montserrat', sans-serif;
    transition: all 0.2s;
}
.cfg-in:focus {
    outline: none;
    border-color: var(--blue2);
    box-shadow: 0 0 8px rgba(33, 133, 244, 0.45);
    background: #0a101d;
}

.cfg-in-wrapper {
    position: relative;
    width: 100%;
}

.cfg-clear-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--gray);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
}
.cfg-clear-btn:hover {
    color: var(--white);
}

.cfg-r2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.cfg-sep {
    height: 1px;
    background: linear-gradient(90deg, transparent, #1f304e, transparent);
    margin: 24px 0;
}

.cfg-go {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 25px;
    background: linear-gradient(135deg, var(--blue2) 0%, var(--blue) 100%);
    color: var(--white);
    border-top: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 6px 20px rgba(33, 133, 244, 0.3);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.cfg-go:active {
    filter: brightness(0.85);
    transform: scale(0.98);
}
.cfg-go:hover {
    box-shadow: 0 6px 25px rgba(33, 133, 244, 0.5);
}

/* ══════════════════════════════════════════════
   P3 — JUEGO (GAME BOARD)
══════════════════════════════════════════════ */
#p-jg {
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
}

/* Header */
#hdr {
    width: 100%;
    display: flex;
    align-items: center;
    background: linear-gradient(180deg, #101624 0%, var(--bg) 100%);
    padding: 10px 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.hl, .hr { flex: 1; }
.hc { 
    flex: 0 0 auto; 
    text-align: center; 
    padding: 0 20px; 
} 
.hr { text-align: right; }

.hclub-container {
    display: flex;
    align-items: center;
    gap: 12px;
}

.hlogo {
    height: clamp(32px, 5.5vw, 46px);
    width: auto;
    object-fit: contain;
}

.hclub {
    font-size: clamp(1rem, 2.2vw, 1.7rem);
    font-weight: 900;
    color: var(--blue2);
    text-transform: uppercase;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 1px;
}
.hsub {
    font-size: clamp(0.6rem, 1vw, 0.8rem);
    color: var(--gray);
    letter-spacing: 2px;
    font-weight: 600;
    text-transform: uppercase;
    margin-top: 2px;
}

#j-dist {
    font-size: clamp(2.5rem, 6vw, 4.2rem);
    font-weight: 700;
    color: var(--gold);
    font-family: 'Oswald', sans-serif;
    line-height: 0.9;
    text-shadow: 0 0 15px rgba(242, 192, 55, 0.35);
}
.hc-lbl {
    font-size: 0.6rem;
    color: var(--gray);
    letter-spacing: 3px;
    font-weight: 700;
    text-transform: uppercase;
    margin-top: 4px;
}

.he-l {
    font-size: clamp(0.6rem, 1vw, 0.8rem);
    color: var(--gray);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
}
.he-v {
    font-size: clamp(1.4rem, 2.8vw, 2.2rem);
    font-weight: 900;
    font-family: 'Oswald', sans-serif;
    color: var(--white);
    margin-top: 2px;
}

/* Cards area */
#cars {
    flex: 1;
    display: flex;
    gap: 8px;
    padding: 8px;
    min-height: 0;
}

/* Player Card */
.cj {
    flex: 1;
    border-radius: 16px;
    border: 2px solid #1b2b48;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
}

/* Scoring zones */
.z-add, .z-sub {
    position: absolute;
    left: 0;
    right: 0;
    height: 50%;
    z-index: 10;
    cursor: pointer;
}
.z-add { top: 0; }
.z-sub { bottom: 0; }

/* Flash hint overlays */
.h-add, .h-sub {
    position: absolute;
    left: 0;
    right: 0;
    height: 50%;
    opacity: 0;
    transition: opacity 0.15s ease-out;
    pointer-events: none;
    z-index: 4;
}
.h-add {
    top: 0;
    background: linear-gradient(180deg, rgba(30, 170, 58, 0.6) 0%, transparent 100%);
    border-radius: 14px 14px 0 0;
}
.h-sub {
    bottom: 0;
    background: linear-gradient(0deg, rgba(224, 48, 48, 0.6) 0%, transparent 100%);
    border-radius: 0 0 14px 14px;
}

/* Visual cues (+1 / -1 in corner) */
.a-add, .a-sub {
    position: absolute;
    right: 14px;
    font-size: clamp(1rem, 2.2vw, 1.8rem);
    opacity: 0.2;
    z-index: 5;
    pointer-events: none;
    transition: opacity 0.2s;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
}
.a-add { top: 12px; }
.a-sub { bottom: 12px; }

/* Card J1 ACTIVO (Premium High Contrast White/Cyan) */
.cj.ac1 {
    background: #ffffff;
    border-color: var(--blue2);
    box-shadow: 0 0 35px rgba(33, 133, 244, 0.45);
}
.cj.ac1 .cn, .cj.ac1 .cpts {
    color: #0b376b;
}
.cj.ac1 .cst {
    background: rgba(33, 133, 244, 0.05);
    border-top: 1px solid rgba(33, 133, 244, 0.1);
}
.cj.ac1 .sv { color: #165bb0; }
.cj.ac1 .sl { color: #53759e; }
.cj.ac1 .chd {
    background: rgba(33, 133, 244, 0.06);
    border-bottom: 1px solid rgba(33, 133, 244, 0.12);
}

.cj.ac1 .a-add, .cj.ac1 .a-sub {
    opacity: 0.8;
    color: #0b376b;
}

/* Card J1 INACTIVO (Dark Blue) */
.cj.in1 {
    background: #0a1220;
    border-color: #121e33;
}
.cj.in1 .cn, .cj.in1 .cpts {
    color: #e5efff;
}
.cj.in1 .cst {
    background: rgba(0, 0, 0, 0.25);
    border-top: 1px solid rgba(255, 255, 255, 0.03);
}
.cj.in1 .sv { color: #82a8db; }
.cj.in1 .sl { color: var(--gray); }
.cj.in1 .chd {
    background: rgba(0, 0, 0, 0.15);
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}

.cj.in1 .z-add, .cj.in1 .z-sub { pointer-events: none; }

/* Card J2 ACTIVO (Premium High Contrast Yellow/Gold) */
.cj.ac2 {
    background: var(--gold);
    border-color: #f7ce56;
    box-shadow: 0 0 35px rgba(242, 192, 55, 0.45);
}
.cj.ac2 .cn, .cj.ac2 .cpts {
    color: #3d2c00;
}
.cj.ac2 .cst {
    background: rgba(0, 0, 0, 0.05);
    border-top: 1px solid rgba(0,0,0,0.08);
}
.cj.ac2 .sv { color: #573f00; }
.cj.ac2 .sl { color: #735b1b; }
.cj.ac2 .chd {
    background: rgba(0, 0, 0, 0.04);
    border-bottom: 1px solid rgba(0,0,0,0.08);
}

.cj.ac2 .a-add, .cj.ac2 .a-sub {
    opacity: 0.8;
    color: #3d2c00;
}

/* Card J2 INACTIVO (Dark Gold tint) */
.cj.in2 {
    background: #0a1220;
    border-color: #121e33;
}
.cj.in2 .cn, .cj.in2 .cpts {
    color: var(--gold);
}
.cj.in2 .cst {
    background: rgba(0, 0, 0, 0.25);
    border-top: 1px solid rgba(255, 255, 255, 0.03);
}
.cj.in2 .sv { color: #c49d31; }
.cj.in2 .sl { color: var(--gray); }
.cj.in2 .chd {
    background: rgba(0, 0, 0, 0.15);
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}

.cj.in2 .z-add, .cj.in2 .z-sub { pointer-events: none; }

.cj .chd {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 14px;
    flex-shrink: 0;
    transition: all 0.2s;
    gap: 8px;
    z-index: 5;
}

/* Player Name */
.cj .cn {
    font-size: clamp(1.4rem, 3.2vw, 3.2rem);
    font-weight: 900;
    text-transform: uppercase;
    font-family: 'Oswald', sans-serif;
    line-height: 1.1;
    transition: color 0.2s;
    text-align: center;
    width: 100%;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}



/* Main Points Display */
.cj .cpts {
    font-size: clamp(14rem, 28vw, 32rem);
    font-weight: 700;
    line-height: 0.85;
    text-align: center;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    transition: color 0.2s;
    position: relative;
    z-index: 1;
}

/* Stats Section */
.cj .cst {
    display: flex;
    justify-content: space-around;
    padding: 12px 10px;
    flex-shrink: 0;
    transition: all 0.2s;
    gap: 8px;
    z-index: 5;
}
.si { 
    text-align: center;
    flex: 1;
}
.sl {
    font-size: clamp(0.55rem, 0.9vw, 0.8rem);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
    font-weight: 700;
    margin-bottom: 2px;
}
.sv {
    font-size: clamp(1.4rem, 3vw, 2.8rem);
    font-weight: 700;
    font-family: 'Oswald', sans-serif;
    line-height: 1;
}

/* ══════════════════════════════════════════════
   PANEL CENTRAL
══════════════════════════════════════════════ */
#pc {
    width: clamp(200px, 30vw, 320px);
    min-width: 195px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 10px 2px 2px;
    gap: 15px;
    z-index: 15;
}

.run-b {
    width: 100%;
    background: linear-gradient(180deg, #1b2b49 0%, #111e33 100%);
    border-radius: 10px;
    overflow: hidden;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.08);
    flex-shrink: 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.run-h {
    background: rgba(33, 133, 244, 0.15);
    padding: 4px 0;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--blue2);
    font-weight: 700;
    text-transform: uppercase;
}
.run-v {
    font-size: clamp(2rem, 3.8vw, 3.4rem);
    font-weight: 700;
    font-family: 'Oswald', sans-serif;
    line-height: 1.1;
    padding: 6px 0;
    color: var(--white);
}

.ent-b {
    width: 100%;
    background: linear-gradient(180deg, #1d222b 0%, #10141a 100%);
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    overflow: hidden;
    text-align: center;
    flex-shrink: 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.ent-h {
    background: rgba(255, 255, 255, 0.05);
    padding: 4px 0;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--gray);
    font-weight: 700;
    text-transform: uppercase;
}
.ent-v {
    font-size: clamp(2.6rem, 5vw, 4.8rem);
    font-weight: 700;
    font-family: 'Oswald', sans-serif;
    padding: 4px 0;
    line-height: 1.1;
    color: var(--gold);
}

/* Panel Central - Mensaje del árbitro */
.brd {
    text-align: center;
    flex-shrink: 0;
    padding: 2px 4px;
    min-height: 35px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.brd-m {
    font-size: 0.75rem;
    font-weight: 900;
    letter-spacing: 1.5px;
    color: var(--gold);
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    line-height: 1.1;
}
.brd-s {
    font-size: 0.55rem;
    color: var(--gray);
    letter-spacing: 1px;
    font-weight: 600;
    text-transform: uppercase;
    margin-top: 1px;
}

/* Botones del panel central */


.pcb {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 12px 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(0.75rem, 1.1vw, 0.95rem);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    color: var(--white);
    transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
}
.pcb:active {
    filter: brightness(0.85);
    transform: scale(0.96);
}



/* CAMBIO TURNO (Solid bright green) */
.pcb-t {
    background: linear-gradient(135deg, #1ea33a 0%, #157d2a 100%);
    border-top: 1px solid rgba(255,255,255,0.25);
    padding: 16px 4px;
    font-weight: 900;
    font-size: clamp(0.85rem, 1.2vw, 1.1rem);
}

/* BOTONERA INFERIOR (Fixed Footer) */
.btm-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px;
    background: rgba(9, 14, 23, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    gap: 10px;
    z-index: 100;
    border-top: 1px solid #1f304e;
}

/* DESHACER (Purple) */
.pcb-u {
    background: #6f2fa3;
}

/* NUEVA PARTIDA (Gray) */
.pcb-a {
    background: #475569;
}



/* ══════════════════════════════════════════════
   MODALES (ESTILO PREMIUM GLASSMORPHISM)
══════════════════════════════════════════════ */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(6px);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}
.modal.on {
    display: flex;
}

.modal-box {
    background: #121a2e;
    border: 1px solid #263859;
    padding: 24px;
    border-radius: 20px;
    width: 90%;
    max-width: 360px;
    box-shadow: var(--shadow-premium);
    animation: zoomIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}



/* MODAL FIRMAS */
#m-firma {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(3, 5, 8, 0.96);
    backdrop-filter: blur(8px);
    z-index: 9000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
    padding: 20px;
}
#m-firma.on { display: flex; }

.ftit {
    color: var(--gold);
    font-size: 1.2rem;
    font-weight: 700;
    text-align: center;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.fcv-container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
    width: 100%;
    max-width: 650px;
}

@media(min-width: 600px) {
    .fcv-container {
        grid-template-columns: 1fr 1fr;
    }
}

.fcv-w {
    background: #111a2e;
    border: 1px solid #1f304e;
    border-radius: 14px;
    padding: 10px;
    text-align: center;
}
.fcv-lbl {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gray);
    margin-bottom: 6px;
    display: block;
    font-weight: 700;
}

canvas.fcv {
    background: #ffffff;
    border-radius: 8px;
    touch-action: none;
    display: block;
    width: 100%;
    height: 140px;
    cursor: crosshair;
}

.fbrow {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 650px;
    margin-top: 10px;
}
.fbrow .wb {
    padding: 15px 20px;
    font-size: 1.05rem;
}

/* MODAL ACTA */
#m-acta {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(3, 5, 8, 0.98);
    z-index: 9500;
    flex-direction: column;
    align-items: center;
    padding: 20px 14px;
    overflow-y: auto;
}
#m-acta.on { display: flex; }

.acta-top {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
    flex-shrink: 0;
    width: 100%;
    max-width: 720px;
}
.ab {
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    letter-spacing: 1px;
    flex: 1;
    color: var(--white);
    transition: all 0.15s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.ab-p { background: var(--blue); }
.ab-p:hover { background: var(--blue2); }
.ab-c { background: #880808; }
.ab-c:hover { background: #a81010; }

#acta-body {
    width: 100%;
    max-width: 720px;
    background: #ffffff;
    color: #1a1a1a;
    border-radius: 12px;
    padding: 24px;
    font-family: 'Montserrat', sans-serif;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    margin-bottom: 30px;
}

/* Acta HTML Styling */
.acta-header {
    border-bottom: 2px solid #333;
    padding-bottom: 12px;
    margin-bottom: 16px;
    text-align: center;
}
.acta-header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 1.8rem;
    color: #111a2e;
    text-transform: uppercase;
    margin-bottom: 4px;
}
.acta-header p {
    font-size: 0.8rem;
    color: #666;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
}

.acta-meta {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    font-size: 0.85rem;
    margin-bottom: 20px;
    background: #f7f9fc;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #e1e8f0;
}
.acta-meta div span {
    font-weight: 700;
    color: #444;
}

.acta-tbl {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 24px;
    font-size: 0.85rem;
}
.acta-tbl th {
    background: #111a2e;
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.acta-tbl td {
    padding: 8px 10px;
    border: 1px solid #d1dbe5;
    text-align: center;
}
.acta-tbl tr:nth-child(even) {
    background: #f8fafc;
}
.acta-tbl tr.acta-totales {
    font-weight: 700;
    background: #e1e8f0 !important;
    border-top: 2px solid #333;
    font-size: 0.9rem;
}

.acta-entradas-cont {
    margin-bottom: 24px;
    border: 1px solid #d1dbe5;
    border-radius: 8px;
    overflow: hidden;
}
.acta-entradas-tit {
    background: #eaeff5;
    padding: 8px 12px;
    font-weight: 700;
    font-size: 0.85rem;
    text-transform: uppercase;
    color: #2b3a54;
    border-bottom: 1px solid #d1dbe5;
}
.acta-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    font-size: 0.75rem;
}
.acta-grid-cell {
    border-right: 1px solid #e2e8f0;
    border-bottom: 1px solid #e2e8f0;
    padding: 6px 4px;
    text-align: center;
}
.acta-grid-cell:nth-child(10n) {
    border-right: none;
}
.acta-grid-header {
    background: #f7fafc;
    font-weight: 700;
    border-bottom: 1px solid #cbd5e1;
}

/* Acta Signatures Display */
.acta-firmas {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 30px;
    border-top: 1px dashed #cbd5e0;
    padding-top: 20px;
}
.acta-firma-box {
    text-align: center;
}
.acta-firma-img {
    max-width: 100%;
    height: 70px;
    border-bottom: 1px solid #999;
    margin-bottom: 6px;
    display: block;
    margin: 0 auto;
}
.acta-firma-lbl {
    font-size: 0.75rem;
    font-weight: 700;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 6px;
}

/* Animations */
@keyframes zoomIn {
    from {
        opacity: 0;
        transform: scale(0.92);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* ══════════════════════════════════════════════
   ESTILO DE IMPRESIÓN (PRINT PRESETS)
══════════════════════════════════════════════ */
@media print {
    @page { 
        size: A4 portrait; 
        margin: 1.2cm; 
    }
    html, body { 
        background: #ffffff !important; 
        color: #000000 !important;
        margin: 0; 
        padding: 0; 
        height: auto !important; 
        overflow: visible !important; 
    }
    body > * { 
        display: none !important; 
    }
    
    #m-acta { 
        display: block !important; 
        position: static !important; 
        background: #ffffff !important;
        padding: 0 !important; 
        margin: 0 !important; 
        overflow: visible !important; 
        inset: auto !important; 
        z-index: auto !important; 
    }
    
    .acta-top { 
        display: none !important; 
    }
    
    #acta-body { 
        display: block !important; 
        position: static !important; 
        width: 100% !important; 
        max-width: 100% !important;
        background: #ffffff !important; 
        color: #000000 !important; 
        border-radius: 0 !important;
        padding: 0 !important; 
        margin: 0 !important; 
        box-shadow: none !important;
    }
    
    #acta-body * { 
        color: #000000 !important; 
        background: transparent !important; 
        box-shadow: none !important;
        text-shadow: none !important;
        -webkit-print-color-adjust: exact; 
        print-color-adjust: exact; 
    }
    
    .acta-meta {
        background: #ffffff !important;
        border: 1px solid #000000 !important;
    }
    
    .acta-tbl th {
        background: #eaeaea !important;
        color: #000000 !important;
        border: 1px solid #000000 !important;
    }
    
    .acta-tbl td {
        border: 1px solid #000000 !important;
    }
    
    .acta-entradas-tit {
        background: #eaeaea !important;
        color: #000000 !important;
        border: 1px solid #000000 !important;
    }
    
    .acta-grid {
        border-left: 1px solid #000000 !important;
        border-top: 1px solid #000000 !important;
    }
    
    .acta-grid-cell {
        border-right: 1px solid #000000 !important;
        border-bottom: 1px solid #000000 !important;
    }
    
    .acta-grid-header {
        background: #eaeaea !important;
        font-weight: 700 !important;
    }
    
    .acta-firmas {
        border-top: 1px dashed #000000 !important;
    }
    
    .acta-firma-img {
        border-bottom: 1px solid #000000 !important;
    }
}

/* ══════════════════════════════════════════════
   NUEVA BARRA DE BOTONES INFERIOR
══════════════════════════════════════════════ */
#bot-bar {
    display: flex;
    gap: 16px;
    padding: 16px 20px;
    background: #0b111e;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    flex-shrink: 0;
}
#bot-bar .pcb {
    flex: 1;
    padding: 22px 10px;
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    letter-spacing: 1.5px;
    border-radius: 14px;
    width: auto; /* Anulamos el ancho del 100% original */
}
#bot-bar #i-undo {
    flex: 1;
    background: #6f2fa3;
}
#bot-bar #i-cambio {
    flex: 2.4;
    background: linear-gradient(135deg, #1ea33a 0%, #157d2a 100%);
    border-top: 1px solid rgba(255, 255, 255, 0.25);
    font-size: clamp(1.2rem, 2.4vw, 1.8rem);
    font-weight: 900;
}
#bot-bar #i-nueva {
    flex: 1;
    background: #475569;
}

/* ══════════════════════════════════════════════
   NUEVO TECLADO NUMÉRICO CENTRAL (.kpad)
══════════════════════════════════════════════ */
.kpad {
    width: 100%;
    background: linear-gradient(185deg, rgba(20, 32, 54, 0.8) 0%, rgba(10, 16, 28, 0.9) 100%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.kpad-disp {
    background: #04080e;
    border: 1px solid #14243b;
    border-radius: 8px;
    color: #00ffcc;
    font-family: 'Oswald', sans-serif;
    font-size: clamp(2.2rem, 3.8vw, 3.4rem);
    font-weight: 700;
    text-align: right;
    padding: 10px 20px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0, 255, 204, 0.45);
    box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.8);
    line-height: 1.2;
}

.kpad-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.kbtn {
    background: linear-gradient(180deg, #1b263b 0%, #111a2e 100%);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(1.4rem, 3.2vw, 2.2rem);
    font-weight: 700;
    padding: 18px 10px;
    cursor: pointer;
    transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 2px 5px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
}

.kbtn:active {
    transform: scale(0.92);
    background: #0f172a;
    border-color: var(--blue2);
}

.kbtn-c {
    background: linear-gradient(180deg, #421a1d 0%, #2b0f11 100%);
    border-color: rgba(220, 53, 69, 0.3);
    color: #ff6b6b;
}
.kbtn-c:active {
    background: #2b0f11;
}

.kbtn-ok {
    background: linear-gradient(180deg, #144b24 0%, #0c3318 100%);
    border-color: rgba(40, 167, 69, 0.3);
    color: #63e6be;
    font-weight: 900;
}
.kbtn-ok:active {
    background: #0c3318;
}

        <div id="acta-body">
            <!-- El contenido del acta se generará dinámicamente con JS para reflejar todos los datos e imágenes de firmas -->
        </div>
    </div>

    <script>
// ══════════════════════════════════════════════
// ESTADO GLOBAL DE LA APLICACIÓN
// ══════════════════════════════════════════════
let gameState = {
    fase: 'config', // Empezamos directamente en configuración
    
    // Configuración
    config: {
        club: 'Club Billar SANTS',
        n1: 'JUGADOR A',
        n2: 'JUGADOR B',
        maxInnings: 9999,
        targetPoints: 400
    },
    
    // Partida en juego
    play: {
        activePlayer: 1, // 1 o 2
        scores: [0, 0],
        innings: 1,
        seriesMax: [0, 0],
        currentRun: 0,
        inningHistory: [], // [{inning: 1, j1Run: 3, j2Run: 1, j1Score: 3, j2Score: 1}, ...]
        contrasalida: false,
        finPartidaMotivo: '' // 'distancia', 'entradas', 'empate'
    }
};

// Historial para Deshacer (Undo Stack)
let undoStack = [];

// ══════════════════════════════════════════════
// SINTETIZADOR DE AUDIO (WEB AUDIO API)
// ══════════════════════════════════════════════
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

// Reproduce un pitido simple (beep)
function playBeep(freq = 800, duration = 0.1, type = 'sine') {
    try {
        initAudio();
        if (!audioCtx) return;
        
        let osc = audioCtx.createOscillator();
        let gainNode = audioCtx.createGain();
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + duration);
    } catch (e) {
        console.warn("Audio error:", e);
    }
}



// ══════════════════════════════════════════════
// HISTORIAL Y CONTROL DE ESTADOS (UNDO/REDO)
// ══════════════════════════════════════════════
function saveState() {
    // Guardamos una copia profunda del estado de juego actual
    const stateCopy = JSON.stringify({
        play: gameState.play
    });
    undoStack.push(stateCopy);
    
    // Limitamos el historial a 50 movimientos
    if (undoStack.length > 50) {
        undoStack.shift();
    }
    
    // Habilitar/Deshabilitar botón de deshacer en la interfaz
    document.getElementById('i-undo').style.opacity = undoStack.length > 1 ? "1" : "0.5";
}

function deshacer() {
    if (undoStack.length <= 1) {
        playBeep(300, 0.2); // Pitido de error
        return;
    }
    
    // Descartamos el estado actual
    undoStack.pop();
    
    // Recuperamos el estado anterior
    const prevStateStr = undoStack[undoStack.length - 1];
    const prevState = JSON.parse(prevStateStr);
    
    // Restauramos
    gameState.play = prevState.play;
    

    
    playBeep(600, 0.15);
    updateScoreboardUI();
}

// ══════════════════════════════════════════════
// GESTIÓN DE VISTAS (PANTALLAS)
// ══════════════════════════════════════════════
function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(scr => {
        scr.classList.remove('on');
    });
    const target = document.getElementById(screenId);
    target.classList.add('on');
}



// ══════════════════════════════════════════════
// PARTIDA: CONFIGURACIÓN
// ══════════════════════════════════════════════
function iniciarPartida() {
    initAudio();
    
    // Leer valores de configuración
    gameState.config.club = 'Club Billar SANTS';
    gameState.config.n1 = document.getElementById('cfg-n1').value.trim() || 'JUGADOR A';
    gameState.config.n2 = document.getElementById('cfg-n2').value.trim() || 'JUGADOR B';
    gameState.config.maxInnings = 9999;
    gameState.config.targetPoints = parseInt(document.getElementById('cfg-pts').value) || 400;
    
    // Inicializar estado de juego
    gameState.fase = 'playing';
    gameState.play.activePlayer = 1;
    gameState.play.scores = [0, 0];
    gameState.play.innings = 1;
    gameState.play.seriesMax = [0, 0];
    gameState.play.currentRun = 0;
    gameState.play.inningHistory = [];
    gameState.play.contrasalida = false;
    gameState.play.finPartidaMotivo = '';
    
    // Configurar cabeceras y textos del tablero
    document.getElementById('j-club').textContent = gameState.config.club.toUpperCase();
    document.getElementById('j-dist').textContent = gameState.config.targetPoints;
    
    document.getElementById('jn1').textContent = gameState.config.n1.toUpperCase();
    document.getElementById('jn2').textContent = gameState.config.n2.toUpperCase();
    
    // Guardar estado inicial en la pila de deshacer
    undoStack = [];
    saveState();
    
    // Mostrar pantalla de juego
    showScreen('p-jg');
    updateScoreboardUI();
    
    playBeep(520, 0.3);
}



// ══════════════════════════════════════════════
// PARTIDA: JUEGO Y ANOTACIÓN
// ══════════════════════════════════════════════
function updateScoreboardUI() {
    const p = gameState.play;
    
    // Actualizar marcadores de puntos
    document.getElementById('jp1').textContent = p.scores[0];
    document.getElementById('jp2').textContent = p.scores[1];
    
    // Entrada actual
    document.getElementById('j-inn').textContent = p.innings;
    
    // Promedios y Series Max
    const avg1 = p.scores[0] / Math.max(1, p.activePlayer === 1 ? p.innings : p.innings - 1);
    const avg2 = p.scores[1] / Math.max(1, p.activePlayer === 2 ? p.innings : p.innings);
    
    document.getElementById('jpr1').textContent = avg1.toFixed(3);
    document.getElementById('jpr2').textContent = avg2.toFixed(3);
    
    document.getElementById('jmx1').textContent = p.seriesMax[0];
    document.getElementById('jmx2').textContent = p.seriesMax[1];
    
    // Actualizar tarjetas de jugador activo (clases CSS)
    const card1 = document.getElementById('c1');
    const card2 = document.getElementById('c2');
    
    if (p.activePlayer === 1) {
        card1.className = 'cj ac1';
        card2.className = 'cj in2';
        document.getElementById('j-msg-main').textContent = p.contrasalida ? 'CONTRASALIDA' : '';
        document.getElementById('j-msg-sub').textContent = '';
    } else {
        card1.className = 'cj in1';
        card2.className = 'cj ac2';
        document.getElementById('j-msg-main').textContent = p.contrasalida ? 'CONTRASALIDA' : '';
        document.getElementById('j-msg-sub').textContent = '';
    }
    
    // Actualizar deshabilitado de botones según el estado
    document.getElementById('i-undo').style.opacity = undoStack.length > 1 ? "1" : "0.5";
}

function cardClic(playerIdx, delta) {
    const p = gameState.play;
    
    // Solo puede puntuar el jugador activo
    if (playerIdx !== p.activePlayer) return;
    
    const targetIdx = playerIdx - 1;
    let oldScore = p.scores[targetIdx];
    let newScore = oldScore + delta;
    
    if (newScore < 0) return;
    
    // Actualizar puntuación
    p.scores[targetIdx] = newScore;
    
    // Actualizar serie del turno actual
    p.currentRun = Math.max(0, p.currentRun + delta);
    
    // Validar serie máxima
    if (p.currentRun > p.seriesMax[targetIdx]) {
        p.seriesMax[targetIdx] = p.currentRun;
    }
    
    // Animación de flash (touch feedback)
    const flashEl = delta > 0 ? 
        document.getElementById(`ha${playerIdx}`) : 
        document.getElementById(`hs${playerIdx}`);
        
    flashEl.style.opacity = '1';
    setTimeout(() => {
        flashEl.style.opacity = '0';
    }, 150);
    
    playBeep(delta > 0 ? 900 : 450, 0.08);
    
    // Comprobar condiciones de victoria en tiempo real
    comprobarPuntoObjetivo(playerIdx);
    
    saveState();
    updateScoreboardUI();
}

function comprobarPuntoObjetivo(playerIdx) {
    const p = gameState.play;
    const target = gameState.config.targetPoints;
    
    if (p.scores[playerIdx - 1] >= target) {
        if (playerIdx === 1) {
            // El Jugador 1 ha llegado a la distancia. Su turno finaliza inmediatamente.
            // Si el Jugador 2 aún no ha completado su turno de esa entrada, se concede la CONTRASALIDA.
            if (!p.contrasalida) {
                p.contrasalida = true;
                
                // Registramos la serie de J1 para esta entrada antes de cambiar
                registrarSerieHistorial(1, p.currentRun);
                p.currentRun = 0;
                
                // Cambiar el turno a J2 para la contrasalida
                p.activePlayer = 2;
                
                playBeep(1000, 0.4);
                
                // Forzamos actualización de pantalla y mostramos alerta
                document.getElementById('j-msg-main').textContent = 'CONTRASALIDA';
                document.getElementById('j-msg-sub').textContent = `${gameState.config.n2.toUpperCase()} (SALIDA)`;
                
                // Notificación visual en el centro del marcador
                console.log("Contrasalida concedida para J2");
            }
        } else {
            // El Jugador 2 ha llegado a la distancia.
            // Si el Jugador 2 llega a la distancia, y el Jugador 1 ya había llegado, es un empate.
            // Si el Jugador 2 llega a la distancia, y el Jugador 1 no había llegado, el Jugador 2 gana inmediatamente.
            p.finPartidaMotivo = p.scores[0] >= target ? 'empate' : 'distancia';
            finalizarPartida();
        }
    }
}

function cambioTurno() {
    const p = gameState.play;
    
    playBeep(650, 0.15);
    
    // Registrar serie en el historial antes de cambiar
    registrarSerieHistorial(p.activePlayer, p.currentRun);
    
    // Si el Jugador activo era el 2 (Amarilla), se completa la entrada
    if (p.activePlayer === 2) {
        // ¿Se ha completado el límite de entradas o se ha jugado la contrasalida?
        if (p.innings >= gameState.config.maxInnings || p.contrasalida) {
            if (p.scores[0] === p.scores[1]) {
                p.finPartidaMotivo = 'empate';
            } else if (p.contrasalida) {
                p.finPartidaMotivo = 'distancia';
            } else {
                p.finPartidaMotivo = 'entradas';
            }
            finalizarPartida();
            return;
        }
        
        // Incrementar entrada
        p.innings++;
        p.activePlayer = 1;
    } else {
        // Si el Jugador activo era el J1 (Blanca)
        // Si estábamos en contrasalida y el J1 falla (cambio de turno), se acaba la partida porque J2 ya no tiene turnos
        if (p.contrasalida) {
            p.finPartidaMotivo = 'distancia';
            finalizarPartida();
            return;
        }
        
        p.activePlayer = 2;
    }
    
    // Resetear valores de turno
    p.currentRun = 0;
    
    saveState();
    updateScoreboardUI();
}

function registrarSerieHistorial(playerIdx, run) {
    const p = gameState.play;
    const innIdx = p.innings - 1;
    
    if (!p.inningHistory[innIdx]) {
        p.inningHistory[innIdx] = {
            inning: p.innings,
            j1Run: 0,
            j2Run: 0,
            j1Score: p.scores[0],
            j2Score: p.scores[1]
        };
    }
    
    if (playerIdx === 1) {
        p.inningHistory[innIdx].j1Run = run;
        p.inningHistory[innIdx].j1Score = p.scores[0];
    } else {
        p.inningHistory[innIdx].j2Run = run;
        p.inningHistory[innIdx].j2Score = p.scores[1];
    }
}





// ══════════════════════════════════════════════
// FINAL DE PARTIDA
// ══════════════════════════════════════════════

function finalizarPartida() {
    gameState.fase = 'finished';
    
    // Registrar el último turno activo en el historial si corresponde
    registrarSerieHistorial(gameState.play.activePlayer, gameState.play.currentRun);
    
    // Pitido de final de partida alegre (escala ascendente)
    playBeep(520, 0.15);
    setTimeout(() => playBeep(650, 0.15), 150);
    setTimeout(() => playBeep(780, 0.3), 300);
    
    finalizarPartidaYMostrarActa();
}

// ══════════════════════════════════════════════
// MODAL: ACTA DE PARTIDO (MOSTRAR E IMPRIMIR)
// ══════════════════════════════════════════════
function finalizarPartidaYMostrarActa() {
    // Generar tabla detallada de entradas
    const p = gameState.play;
    let tablaEntradasHTML = '';
    
    // Agrupamos en bloques de 10 entradas para que el acta impresa sea muy compacta e igual que en federación
    const maxDisputed = p.inningHistory.length;
    let gridsHTML = '';
    
    for (let block = 0; block < Math.ceil(maxDisputed / 10); block++) {
        let headers = '<div class="acta-grid-cell acta-grid-header">JUG.</div>';
        let j1Row = `<div class="acta-grid-cell acta-grid-header" style="color:var(--blue); font-weight:700;">${gameState.config.n1.substring(0,6).toUpperCase()}</div>`;
        let j2Row = `<div class="acta-grid-cell acta-grid-header" style="color:#a87c00; font-weight:700;">${gameState.config.n2.substring(0,6).toUpperCase()}</div>`;
        
        for (let i = 0; i < 10; i++) {
            const entIdx = (block * 10) + i;
            const entNum = entIdx + 1;
            
            headers += `<div class="acta-grid-cell acta-grid-header">${entNum}</div>`;
            
            if (entIdx < maxDisputed) {
                const hist = p.inningHistory[entIdx] || { j1Run: 0, j2Run: 0, j1Score: 0, j2Score: 0 };
                // Mostrar la serie realizada (puntos de esa entrada) y la puntuación acumulada en pequeñito
                j1Row += `<div class="acta-grid-cell" style="line-height:1.2"><b>${hist.j1Run}</b><br><span style="font-size:0.6rem; color:#666">${hist.j1Score}</span></div>`;
                j2Row += `<div class="acta-grid-cell" style="line-height:1.2"><b>${hist.j2Run}</b><br><span style="font-size:0.6rem; color:#666">${hist.j2Score}</span></div>`;
            } else {
                j1Row += '<div class="acta-grid-cell">-</div>';
                j2Row += '<div class="acta-grid-cell">-</div>';
            }
        }
        
        gridsHTML += `
            <div class="acta-entradas-cont" style="margin-bottom:12px">
                <div class="acta-entradas-tit">Entradas ${block * 10 + 1} a ${block * 10 + 10}</div>
                <div class="acta-grid">
                    ${headers}
                    ${j1Row}
                    ${j2Row}
                </div>
            </div>
        `;
    }
    
    // Formatear motivo del fin de partida
    let motivoTexto = 'FINALIZACIÓN NORMAL';
    if (p.finPartidaMotivo === 'distancia') {
        motivoTexto = 'DISTANCIA ALCANZADA';
    } else if (p.finPartidaMotivo === 'entradas') {
        motivoTexto = 'LÍMITE DE ENTRADAS COMPLETADO';
    } else if (p.finPartidaMotivo === 'empate') {
        motivoTexto = 'EMPATE CONTRAPARTIDA';
    }
    
    const fecha = new Date().toLocaleDateString('es-ES', {
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
    });
    
    // Calcular estadísticas generales finales
    const totInnings = p.inningHistory.length || 1;
    const avg1 = p.scores[0] / totInnings;
    const avg2 = p.scores[1] / totInnings;
    
    const htmlActa = `
        <div class="acta-header">
            <h1>ACTA OFICIAL DE PARTIDO</h1>
            <p>${gameState.config.club.toUpperCase()}</p>
        </div>
        
        <div class="acta-meta">
            <div><span>Fecha:</span> ${fecha}</div>
            <div><span>Resultado:</span> ${motivoTexto}</div>
            <div><span>Entradas totales:</span> ${totInnings}</div>
        </div>
        
        <table class="acta-tbl">
            <thead>
                <tr>
                    <th>Jugador</th>
                    <th>Puntos</th>
                    <th>Entradas</th>
                    <th>Promedio General</th>
                    <th>Serie Máx.</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="text-align:left; font-weight:700; color:#0b376b;">${gameState.config.n1.toUpperCase()}</td>
                    <td><b>${p.scores[0]}</b></td>
                    <td>${totInnings}</td>
                    <td><b>${avg1.toFixed(3)}</b></td>
                    <td>${p.seriesMax[0]}</td>
                </tr>
                <tr style="border-bottom: 2px solid #333;">
                    <td style="text-align:left; font-weight:700; color:#573f00;">${gameState.config.n2.toUpperCase()}</td>
                    <td><b>${p.scores[1]}</b></td>
                    <td>${totInnings}</td>
                    <td><b>${avg2.toFixed(3)}</b></td>
                    <td>${p.seriesMax[1]}</td>
                </tr>
            </tbody>
        </table>
        
        <h3 style="font-family:'Oswald',sans-serif; margin-bottom:10px; font-size:1.1rem; text-transform:uppercase; color:#111a2e">Desarrollo Entrada a Entrada</h3>
        ${gridsHTML}
        
        <div class="acta-firmas">
            <div class="acta-firma-box">
                <div style="height:70px; border-bottom:1px solid #999; width: 200px; margin: 0 auto;"></div>
                <div class="acta-firma-lbl">Firma J1<br><b>${gameState.config.n1.toUpperCase()}</b></div>
            </div>
            <div class="acta-firma-box">
                <div style="height:70px; border-bottom:1px solid #999; width: 200px; margin: 0 auto;"></div>
                <div class="acta-firma-lbl">Firma J2<br><b>${gameState.config.n2.toUpperCase()}</b></div>
            </div>
        </div>
    `;
    
    document.getElementById('acta-body').innerHTML = htmlActa;
    
    // Abrir acta
    document.getElementById('m-acta').classList.add('on');
    
    playBeep(850, 0.25);
}

function imprimirActa() {
    window.print();
}

function cerrarActaYNuevaPartida() {
    document.getElementById('m-acta').classList.remove('on');
    nuevaPartida();
}

function confirmarNuevaPartida() {
    if (confirm("¿Seguro que deseas reiniciar la partida actual y volver a la configuración? Se perderán todos los datos actuales.")) {
        nuevaPartida();
    }
}

function nuevaPartida() {
    gameState.fase = 'config';
    showScreen('p-cfg');
    playBeep(500, 0.15);
}

// ══════════════════════════════════════════════
// LÓGICA DEL TECLADO CENTRAL
// ══════════════════════════════════════════════
let keypadInput = "";

function kpPress(num) {
    initAudio();
    if (keypadInput.length >= 3) return; // límite seguro de 3 cifras (hasta 999)
    if (keypadInput === "0" || keypadInput === "") {
        keypadInput = num.toString();
    } else {
        keypadInput += num.toString();
    }
    document.getElementById('kp-val').textContent = keypadInput;
    playBeep(700, 0.05);
}

function kpClear() {
    initAudio();
    keypadInput = "";
    document.getElementById('kp-val').textContent = "0";
    playBeep(400, 0.05);
}

function kpApprove() {
    initAudio();
    let val = parseInt(keypadInput) || 0;
    
    const p = gameState.play;
    const activePlayer = p.activePlayer;
    
    // 1. Anotar puntos si es mayor a 0
    if (val > 0) {
        const targetIdx = activePlayer - 1;
        p.scores[targetIdx] += val;
        p.currentRun = Math.max(0, p.currentRun + val);
        if (p.currentRun > p.seriesMax[targetIdx]) {
            p.seriesMax[targetIdx] = p.currentRun;
        }
        
        // Efecto visual flash
        const flashEl = document.getElementById(`ha${activePlayer}`);
        if (flashEl) {
            flashEl.style.opacity = '1';
            setTimeout(() => {
                flashEl.style.opacity = '0';
            }, 150);
        }
        
        playBeep(900, 0.12);
        
        // Validar distancia/contrasalida
        comprobarPuntoObjetivo(activePlayer);
    }
    
    // 2. Limpiar visor
    kpClear();
    
    // 3. Cambiar de turno si la partida sigue activa y no se forzó cambio automático (ej. contrasalida)
    if (gameState.fase === 'playing') {
        if (p.activePlayer === activePlayer) {
            cambioTurno();
        } else {
            saveState();
            updateScoreboardUI();
        }
    }
}

function clearInput(inputId) {
    initAudio();
    const input = document.getElementById(inputId);
    if (input) {
        input.value = "";
        input.focus(); // mantiene el foco y teclado virtual en pantalla
        playBeep(450, 0.05);
    }
}
